<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SafarSquad-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafarSquad - Travel Together, Instantly</title>

    <!-- ✅ FIXED: PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />

    <!-- ✅ FIXED: Updated mobile web app tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SafarSquad" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png" />

    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      rel="preload"
      as="video"
      href="/assets/HeroVideo.mp4"
      type="video/mp4"
    />
    <link
      rel="preload"
      as="audio"
      href="/assets/ambient.mp3"
      type="audio/mpeg"
    />

    <!-- MS Tile Icons -->
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#f97316" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Connect with fellow travelers across India. Plan spontaneous adventures and build lasting friendships with SafarSquad."
    />
    <meta
      name="keywords"
      content="travel, India, adventure, group travel, backpacking, solo travel, companions"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="SafarSquad - Travel Together, Instantly"
    />
    <meta
      property="og:description"
      content="Connect with fellow travelers across India. Plan spontaneous adventures and build lasting friendships."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://SafarSquad.app" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
