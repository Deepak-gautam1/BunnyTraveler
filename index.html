<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SafarSquad-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafarSquad - Find Your Travel Squad</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B35" />

    <!-- Mobile Web App Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SafarSquad" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png" />

    <!-- Preconnect & Preload -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      rel="preload"
      as="video"
      href="/assets/HeroVideo.mp4"
      type="video/mp4"
    />
    <link
      rel="preload"
      as="audio"
      href="/assets/ambient.mp3"
      type="audio/mpeg"
    />

    <!-- MS Tile Icons -->
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#FF6B35" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Connect with travelers across India. Plan spontaneous adventures and find your perfect travel squad with SafarSquad."
    />
    <meta
      name="keywords"
      content="travel India, group travel, travel buddies, backpacking India, solo travel, adventure companions, SafarSquad"
    />
    <meta name="author" content="SafarSquad" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safarsquad.in" />
    <meta property="og:title" content="SafarSquad - Find Your Travel Squad" />
    <meta
      property="og:description"
      content="Connect with travelers across India. Plan spontaneous adventures and find your perfect travel squad."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://safarsquad.in" />
    <meta
      property="twitter:title"
      content="SafarSquad - Find Your Travel Squad"
    />
    <meta
      property="twitter:description"
      content="Connect with travelers across India. Plan spontaneous adventures and find your perfect travel squad."
    />
    <meta property="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
